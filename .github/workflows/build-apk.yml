name: Build APK

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_type:
        description: "Тип сборки"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.2"

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Decode keystore (release only)
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::KEYSTORE_BASE64 secret is empty — release будет собран без подписи"
            exit 0
          fi
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/release.keystore
          echo "keystore decoded: $(wc -c < keystore/release.keystore) bytes"

      - name: Build debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Build release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: roubao-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: roubao-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup keystore
        if: ${{ always() && github.event.inputs.build_type == 'release' }}
        run: rm -f keystore/release.keystore
